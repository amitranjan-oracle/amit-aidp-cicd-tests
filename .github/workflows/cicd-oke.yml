name: aidp-cicd-oke
on:
  workflow_dispatch: {}

# Coexists with cicd-vm (VM). Targets the OKE runner scale set by name.
concurrency:
  # Shared with cicd-vm — VM and OKE must not deploy concurrently (same folder).
  group: aidp-cicd-deploy
  cancel-in-progress: false

jobs:
  reconcile:
    runs-on: amit-cicd-oke              # == the gha-runner-scale-set install name
    # `--runner oke` differs from vm ONLY in the signer (RUNNER_AUTH); everything
    # else — config, git folder, bundle — is identical. The reconcile authenticates
    # to AIDP via the NODE's instance principal (DataServices-Compute-DG): OKE
    # Workload Identity authenticates fine for data-lake ops, but AIDP does NOT
    # authorize WI principals for workspace volume/list ops (docs/aidp-wi-rbac-issue.md),
    # so the node instance principal is used (runner pods reach the node IMDS).
    # Phase 2 re-binds the shared git folder to whichever principal runs, so VM
    # and OKE can use the same folder.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Python deps
        run: pip install oci requests pyyaml
      - name: Preflight imports
        run: python3 -c "import oci, requests, yaml; print('deps ok', oci.__version__)"
      - name: Reconcile AIDP
        run: python3 deploy/aidp_deploy.py --config deploy/cicd.yaml --runner oke
