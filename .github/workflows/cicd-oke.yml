name: aidp-cicd-oke
on:
  workflow_dispatch: {}

# Coexists with cicd.yml (VM). Targets the OKE runner scale set by name.
jobs:
  reconcile:
    runs-on: amit-cicd-oke              # == the gha-runner-scale-set install name
    # No AIDP_AUTH_METHOD: the reconcile authenticates to AIDP via the NODE's
    # instance principal (DataServices-Compute-DG) — same model as the VM runner.
    # OKE Workload Identity authenticates fine for data-lake ops, but AIDP's
    # workspace VolumeRequestHandler does NOT authorize WI principals (mkdir/git
    # folder ops get RBAC-denied), whereas the node instance principal IS
    # authorized. The runner pods reach the node IMDS to get that principal.
    #
    # The OKE runner uses its OWN AIDP git folder: per-instance-principal
    # credential ownership means the OKE node principal can't pull the folder the
    # VM created (and vice-versa), so each runner owns a distinct folder.
    env:
      AIDP_PARENT_DIR: /Workspace/cicd_folder
      AIDP_FOLDER_PATH: /Workspace/cicd_folder/amit-aidp-cicd-tests-oke
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Python deps
        run: pip install oci requests pyyaml
      - name: Preflight imports
        run: python3 -c "import oci, requests, yaml; print('deps ok', oci.__version__)"
      - name: Reconcile AIDP
        run: python3 deploy/aidp_deploy.py --config deploy/cicd.yaml
